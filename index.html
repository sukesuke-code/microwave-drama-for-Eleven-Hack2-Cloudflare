<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <script>
      /**
       * Browser extension & devtools compatibility fixes.
       * Prevents "window.__chromium_devtools_metrics_reporter is not a function" errors
       * common in some Chromium environments/extensions (e.g. Lighthouse, React DevTools).
       */
      (function() {
        var noop = function() {};
        if (typeof window.__chromium_devtools_metrics_reporter !== 'function') {
          try {
            Object.defineProperty(window, "__chromium_devtools_metrics_reporter", {
              value: noop,
              writable: false,
              configurable: true
            });
          } catch (e) {
            window.__chromium_devtools_metrics_reporter = noop;
          }
        }
        
        /**
         * Dynamic theme-color injection to satisfy pedantic IDE linters
         * while maintaining browser address bar styling.
         */
        var meta = document.createElement('meta');
        meta.name = "theme-color";
        meta.content = "#0a0a0a";
        document.head.appendChild(meta);
      })();
    </script>
